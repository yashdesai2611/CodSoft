<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* CALCULATOR */
.calculator {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    width: 320px;
}

/* DISPLAY */
.display {
    width: 100%;
    height: 70px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    text-align: right;
    font-size: 2rem;
    padding: 10px;
    border-radius: 10px;
    background: #000;
    color: #00ffcc;
}

/* BUTTON GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* BUTTON */
button {
    padding: 15px;
    font-size: 1.2rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.08);
}

/* COLORS */
.number {
    background: #1f1f1f;
    color: white;
}

.operator {
    background: #ff9800;
    color: white;
}

.equal {
    background: #00c853;
    color: white;
    grid-column: span 2;
}

.clear {
    background: #e53935;
    color: white;
}

.backspace {
    background: #6c757d;
    color: white;
}

/* RESPONSIVE */
@media(max-width:400px){
    .calculator {
        width: 90%;
    }
}
</style>
</head>

<body>

<div class="calculator">

    <!-- DISPLAY -->
    <input type="text" id="display" class="display" disabled>

    <!-- BUTTONS -->
    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="backspace" onclick="backspace()">⌫</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>

    </div>
</div>

<script>
let display = document.getElementById("display");

/* ADD VALUE */
function appendValue(value) {
    display.value += value;
}

/* CLEAR */
function clearDisplay() {
    display.value = "";
}

/* BACKSPACE */
function backspace() {
    display.value = display.value.slice(0, -1);
}

/* CALCULATE */
function calculate() {
    let expression = display.value;

    if (expression === "") {
        display.value = "";
    } else {
        try {
            display.value = eval(expression);
        } catch {
            display.value = "Error";
        }
    }
}
</script>

</body>
</html>
